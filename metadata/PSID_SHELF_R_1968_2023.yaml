  key_variables:
    ID: Individual identifier = ER30001 * 1000 + ER30002 (1968 interview no. + person
      no.)
    YEAR: Survey wave / calendar year of interview
  weight_variables:
    FW: Family-level longitudinal expansion weight
    IW: Individual-level longitudinal expansion weight
changelog:
- type: initial
  description: 'Initial PSID-SHELF-R release — R port of the Stata PSID-SHELF construction:
    ingest main extract + MH/CAH/PID supplements, collect input variables, generate
    derived variables, revise (not-in-FU / family-size / PCEPI inflation), and publish
    a labelled LONG .dta + parquet.'
  variables_affected: all
  rationale: First version of the R reproduction of the longitudinal file.
- type: new_wave
  wave: 2023.0
  git_commits:
  - '515b654 — add spec/update_input_var_map.R: script to extend input_var_map.csv
    from cross-year index'
  - aa7270e — add 2023 wave to spec/input_var_map.csv (423 new variable-wave rows;
    30 COVID supplement vars skipped)
  - c04ef9e — add spec/psid-cross-year-index.xlsx; update spec/README.md with new-wave
    workflow
  - '927c1f6 — fix R/collect/covid_19.R: 5 recode harmonization issues found via 2021-vs-2023
    codebook comparison'
  - c68ef68 — remove stale spec/metadata.csv
  - '7aaa6a7 — update spec/parameters.json: psid_lastwave, year[], wlthyear[] extended
    to 2023'
  spec_changes:
    input_var_map: 423 new rows added for 2023 wave via spec/update_input_var_map.R
      (cross-year-index lookup); 30 COVID supplement variables have no 2023 counterpart
      and were skipped.
    parameters_json: psid_lastwave bumped to 2023; 2023 appended to year[] and wlthyear[].
    cross_year_index: spec/psid-cross-year-index.xlsx added; Y2023 column used to
      populate input_var_map for the new wave.
  recode_fixes:
  - variable: covid_diag_hosp_any_rp/sp
    fix: 'bin9 -> bin5: code 8 (DK) added in 2023 was unhandled'
  - variable: covid_diag_noho_sev_rp/sp
    fix: 'sev_fn: added 8 to NA catch (code 8 added in 2023)'
  - variable: covid_test_ling_any_rp/sp
    fix: new code 2 'Not sure' added in 2023; mapped to NA (was producing sentinel
      -1)
  - variable: covid_diag_hosp_num_rp/sp
    fix: code 98 (DK) added in 2023; added to NA catch alongside 99
  variables_affected: all time-varying variables; 2023 wave adds one new person-year
    row per respondent
  rationale: Extension of the longitudinal file from 2021 to 2023. Recode logic is
    wave-invariant except for the four COVID variables above, which had genuine coding
    changes between 2021 and 2023.
quality:
  completeness:
    ID: OK (0 nulls)
    YEAR: OK (0 nulls)
  known_issues:
    ingestion_one_person: Output has 3,533,040 rows (84,120 persons × 42 waves); the
      reference release has 42 more (84,121 persons) — a one-person difference originating
      in 01-ingest.R, not the construction logic.
    coverage_gaps: 552 / 593 reference variables reproduced; the unreproduced ~41
      are the _rp/_sp and combined-majority variants in the most complex generators
      (education levels, race-ethnicity, COVID).
  validation:
    reference: raw-data/psid-shelf-original/PSIDSHELF_1968_2021_LONG.dta
    how: Rscript 08-validate-output.R [n_vars]  (value-level agreement vs the reference
      release)
